<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 384" width="512" height="384">
  <!-- Background -->
  <rect width="512" height="384" fill="#c7c0b2"/>
  <!-- Outer border -->
  <rect x="20" y="20" width="472" height="344" fill="none" stroke="#3b4147" stroke-width="18"/>
  <!-- Inner shadow rect -->
  <rect x="54" y="56" width="404" height="272" fill="rgba(70,76,82,0.14)"/>

  <!-- Bonds (identical geometry to H2O) -->
  <line x1="256" y1="192" x2="168" y2="250" stroke="#7b8490" stroke-width="8" stroke-linecap="round"/>
  <line x1="256" y1="192" x2="344" y2="250" stroke="#7b8490" stroke-width="8" stroke-linecap="round"/>

  <!-- Center atom — H2O shape but wrong color (#7188a6 instead of oxygen #a66f6f) -->
  <circle cx="256" cy="192" r="44" fill="#7188a6" stroke="#d7dde5" stroke-width="5"/>
  <!-- Hydrogen left (correct) -->
  <circle cx="168" cy="250" r="28" fill="#b7bec7" stroke="#d7dde5" stroke-width="5"/>
  <!-- Hydrogen right (correct) -->
  <circle cx="344" cy="250" r="28" fill="#b7bec7" stroke="#d7dde5" stroke-width="5"/>
</svg>
